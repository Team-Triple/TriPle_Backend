name: Build and Push

on:
  push:
    branches: [ "main", "develop" ]
  workflow_dispatch:

concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test_build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582
      - run: chmod +x ./gradlew
      - run: ./gradlew test
        env:
          SPRING_PROFILES_ACTIVE: test
      - name: Verify MySQL FULLTEXT integration test is executed
        run: |
          REPORT="build/test-results/test/TEST-org.triple.backend.group.Integration.GroupServiceSearchFullTextMySqlTest.xml"
          if [ ! -f "$REPORT" ]; then
            echo "Missing test report: $REPORT"
            exit 1
          fi
          SKIPPED=$(grep -o 'skipped="[0-9]*"' "$REPORT" | head -n1 | tr -dc '0-9')
          if [ "$SKIPPED" != "0" ]; then
            echo "MySQL FULLTEXT integration test was skipped."
            cat "$REPORT"
            exit 1
          fi
      - run: ./gradlew bootJar
      - run: ./gradlew build -x test

      - name: Upload boot jar
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: |
            build/libs/*.jar
            !build/libs/*-plain.jar
          if-no-files-found: error

  publish_image:
    needs: test_build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download boot jar
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs

      - name: Prepare jar for docker build
        run: |
          set -e
          JAR_PATH="$(find build -type f -name '*.jar' ! -name '*-plain.jar' | head -n 1)"
          if [ -z "${JAR_PATH}" ]; then
            echo "No jar found after artifact download"
            find build -maxdepth 5 -type f || true
            exit 1
          fi

          cp "${JAR_PATH}" /tmp/app.jar
          rm -rf build/libs
          mkdir -p build/libs
          cp /tmp/app.jar build/libs/app.jar
          ls -al build/libs

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/team-triple/backend:${{ github.sha }}
            ghcr.io/team-triple/backend:${{ github.ref_name }}
