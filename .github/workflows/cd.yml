name: CD

on:
  workflow_run:
    workflows: ["Build and Push"]
    types: [completed]
  workflow_dispatch:
    inputs:
      branch_name:
        description: "배포 브랜치"
        required: true
        type: choice
        options:
          - develop
          - main
      image_tag:
        description: "배포할 이미지 태그(미입력 시 branch 태그 사용)"
        required: false
        type: string

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.event.inputs.branch_name || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        contains(fromJson('["develop","main"]'), github.event.workflow_run.head_branch)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Debug trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "workflow_run.conclusion=${{ github.event.workflow_run.conclusion }}"
          echo "workflow_run.event=${{ github.event.workflow_run.event }}"
          echo "workflow_run.head_branch=${{ github.event.workflow_run.head_branch }}"
          echo "workflow_run.head_sha=${{ github.event.workflow_run.head_sha }}"

      - name: Checkout deploy ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch_name || github.event.workflow_run.head_sha }}

      - name: Set deploy vars
        run: |
          mkdir -p ~/.ssh

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH_NAME="${{ github.event.inputs.branch_name }}"
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
            if [ -z "${IMAGE_TAG}" ]; then
              IMAGE_TAG="${BRANCH_NAME}"
            fi
          else
            BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"
            IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
          fi

          echo "BRANCH_NAME=${BRANCH_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

          if [ "${BRANCH_NAME}" = "develop" ]; then
            echo "${{ secrets.EC2_SSH_KEY_DEV }}" > ~/.ssh/deploy_key.pem
            echo "TARGET_HOST=${{ secrets.DEV_HOST }}" >> "$GITHUB_ENV"
          elif [ "${BRANCH_NAME}" = "main" ]; then
            echo "${{ secrets.EC2_SSH_KEY_PROD }}" > ~/.ssh/deploy_key.pem
            echo "TARGET_HOST=${{ secrets.PROD_HOST }}" >> "$GITHUB_ENV"
          else
            echo "Unsupported branch for deploy: ${BRANCH_NAME}"
            exit 1
          fi

          chmod 600 ~/.ssh/deploy_key.pem

      - name: Write .env
        run: |
          if [ "${BRANCH_NAME}" = "develop" ]; then
            printf "%s" "${{ secrets.ENV_DEV }}" > .env
          else
            printf "%s" "${{ secrets.ENV_PROD }}" > .env
          fi

      - name: Validate profile mapping
        run: |
          set -e

          PROFILE="$(grep -E '^SPRING_PROFILES_ACTIVE=' .env | tail -n1 | cut -d= -f2- | tr -d '\r' | xargs)"

          if [ -z "${PROFILE}" ]; then
            echo "SPRING_PROFILES_ACTIVE is empty"
            exit 1
          fi

          if [ "${BRANCH_NAME}" = "develop" ] && [ "${PROFILE}" != "dev" ]; then
            echo "Profile mismatch: develop branch requires SPRING_PROFILES_ACTIVE=dev"
            exit 1
          fi

          if [ "${BRANCH_NAME}" = "main" ] && [ "${PROFILE}" != "prod" ]; then
            echo "Profile mismatch: main branch requires SPRING_PROFILES_ACTIVE=prod"
            exit 1
          fi

      - name: Upload files
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          DEPLOY_PATH="${DEPLOY_PATH:-/home/ubuntu/deploy}"
          ENV_FILE="${GITHUB_WORKSPACE}/.env"
          COMPOSE_FILE="${GITHUB_WORKSPACE}/docker-compose.yml"

          if [ ! -f "${COMPOSE_FILE}" ]; then
            COMPOSE_FILE="${GITHUB_WORKSPACE}/docker/docker-compose.yml"
          fi

          if [ ! -f "${COMPOSE_FILE}" ]; then
            echo "docker-compose file not found in workspace"
            find "${GITHUB_WORKSPACE}" -maxdepth 3 -type f \( -name '*compose*.yml' -o -name '*compose*.yaml' \) || true
            exit 1
          fi

          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no ubuntu@"${TARGET_HOST}" "mkdir -p ${DEPLOY_PATH}"
          scp -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no "${ENV_FILE}" ubuntu@"${TARGET_HOST}":"${DEPLOY_PATH}"/.env
          scp -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no "${COMPOSE_FILE}" ubuntu@"${TARGET_HOST}":"${DEPLOY_PATH}"/docker-compose.yml
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no ubuntu@"${TARGET_HOST}" "chmod 600 ${DEPLOY_PATH}/.env"

      - name: Deploy
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          DEPLOY_PATH="${DEPLOY_PATH:-/home/ubuntu/deploy}"

          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no ubuntu@"${TARGET_HOST}" "
            set -e
            cd ${DEPLOY_PATH}

            echo '[before cleanup]'
            docker system df || true

            # Previous deployments use SHA tags, so old images can accumulate quickly.
            docker container prune -f || true
            docker image prune -af || true
            docker builder prune -af || true

            echo '[before pull]'
            docker system df || true

            docker pull ghcr.io/team-triple/backend:${IMAGE_TAG}
            IMAGE_TAG=${IMAGE_TAG} docker compose up -d --remove-orphans

            # Keep only images used by running containers to prevent disk-full failures.
            docker image prune -af || true
            docker builder prune -af || true

            echo '[after cleanup]'
            docker system df || true
          "

