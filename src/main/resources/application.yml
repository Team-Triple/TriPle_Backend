server:
  servlet:
    session:
      cookie:
        same-site: none
        secure: true
        http-only: true

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL}
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: false

oauth:
  kakao:
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}

cors:
  app-mapping: "/**"
  allowed-origins: ${CORS_ALLOWED_ORIGINS_FRONT}
  allowed-methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowed-headers:
    - "*"
  allow-credentials: true
  exposed-headers:
    - X-CSRF-Token

restClient:
  connectTimeout: 2
  readTimeout: 2

app:
  aws:
    s3:
      region: ap-northeast-2
      bucket: triple-dev-s3
      presign:
        put-expire-seconds: 180
      prefix:
        pending: uploads/pending/
        uploaded: uploads/uploaded/
        get-url-prefix: https://triple-dev-s3.s3.ap-northeast-2.amazonaws.com/
      upload-policy:
        allowed-extensions: [jpg, jpeg, png]
        allowed-content-types: [image/jpeg, image/png]
  search:
    group:
      fulltext-enabled: true
