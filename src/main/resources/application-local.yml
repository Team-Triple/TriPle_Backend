# 스프링
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/triple}
    username: ${MYSQL_USERNAME:triple}
    password: ${MYSQL_PASSWORD:triple}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: false

#CORS
cors:
  app-mapping: "/**"
  allowed-origins: ${CORS_ALLOWED_ORIGINS_FRONT:http://localhost:3000}
  allowed-methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowed-headers:
    - "*"
  allow-credentials: true
  exposed-headers:
    - Authorization

# 인증
oauth:
  kakao:
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}

rest-client:
  connect-timeout: 2
  read-timeout: 2

# 보안
security:
  jwt:
    secret: ${JWT_SECRET:local-dev-jwt-secret-change-me}
    access-token-expire-seconds: ${JWT_ACCESS_TOKEN_EXPIRE_SECONDS:86400}
  uuid:
    secret: ${UUID_CRYPTO_SECRET:local-dev-uuid-secret-change-me}

# 인프라
app:
  aws:
    s3:
      region: ap-northeast-2
      bucket: triple-dev-s3
      presign:
        put-expire-seconds: 180
      prefix:
        pending: uploads/pending/
        uploaded: uploads/uploaded/
        get-url-prefix: https://triple-dev-s3.s3.ap-northeast-2.amazonaws.com/
      upload-policy:
        allowed-extensions: [jpg, jpeg, png]
        allowed-content-types: [image/jpeg, image/png]
